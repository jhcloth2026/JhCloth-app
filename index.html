<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JHCLOTH</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
}

/* HEADER */
header{
  text-align:center;
  padding:15px;
  border-bottom:1px solid #222;
}
header h1{
  margin:0;
  font-size:38px;
}
header p{
  color:#aaa;
}

/* FEED */
#feed{
  max-width:500px;
  margin:auto;
}

/* POST */
.post{
  background:#111;
  margin:15px 10px;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 0 10px rgba(255,255,255,0.05);
}

.post img,
.post video{
  width:100%;
  height:420px;
  object-fit:cover;
  background:black;
}

/* INFO */
.content{
  padding:10px;
}

.content h3{
  margin:5px 0;
}

.content p{
  color:#aaa;
}

/* BOTONES */
.actions{
  display:flex;
  justify-content:space-around;
  padding:10px;
}

button{
  background:#222;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#333;
}

/* LIKES */
.count{
  text-align:center;
  color:#aaa;
  font-size:14px;
  padding-bottom:10px;
}

/* LOADING */
.loader{
  text-align:center;
  padding:20px;
  color:#666;
}
</style>
</head>

<body>

<header>
<h1>JHCLOTH</h1>
<p>Elegancia · Disciplina · Presencia</p>
</header>

<div id="feed"></div>

<div class="loader" id="loader">Cargando más contenido...</div>

<script>

/* =========================
   BASE DE CONTENIDO
========================= */
const posts = [
  {type:"image", url:"https://source.unsplash.com/600x800/?fashion,street", title:"Moda urbana", text:"La elegancia no depende del precio."},
  {type:"video", url:"https://www.w3schools.com/html/mov_bbb.mp4", title:"JhCloth Style", text:"Disciplina y presencia siempre."},
  {type:"image", url:"https://source.unsplash.com/600x800/?model,fashion", title:"Nueva colección", text:"Estilo único JhCloth."},
  {type:"video", url:"https://www.w3schools.com/html/movie.mp4", title:"Video fashion", text:"Movimiento y estilo."}
];

let index = 0;
const feed = document.getElementById("feed");

/* =========================
   CREAR POST
========================= */
function createPost(data){

  const div = document.createElement("div");
  div.className = "post";

  let media = "";

  if(data.type === "image"){
    media = `<img src="${data.url}">`;
  } else {
    media = `
      <video autoplay muted loop playsinline>
        <source src="${data.url}">
      </video>
    `;
  }

  div.innerHTML = `
    ${media}

    <div class="content">
      <h3>${data.title}</h3>
      <p>${data.text}</p>
    </div>

    <div class="actions">
      <button onclick="like(this)">❤️ Like</button>
      <button onclick="share()">📤 Share</button>
    </div>

    <div class="count">0 likes</div>
  `;

  feed.appendChild(div);
}

/* =========================
   CARGAR MÁS (INFINITO)
========================= */
function loadMore(){
  for(let i = 0; i < 5; i++){
    createPost(posts[index % posts.length]);
    index++;
  }
}

/* primera carga */
loadMore();

/* scroll infinito real */
window.addEventListener("scroll", () => {
  if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 200){
    loadMore();
  }
});

/* =========================
   LIKE
========================= */
function like(btn){
  let post = btn.closest(".post");
  let count = post.querySelector(".count");

  let num = parseInt(count.innerText);
  if(isNaN(num)) num = 0;

  count.innerText = (num + 1) + " likes";
}

/* SHARE */
function share(){
  alert("Compartido 📤");
}

</script>

</body>
</html>
