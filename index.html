
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>JhCloth Social</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
}

header{
  text-align:center;
  padding:15px;
  color:#00e5ff;
}

#feed{
  height:100vh;
  overflow-y:auto;
}

.post{
  background:#111;
  margin:10px;
  padding:10px;
  border-radius:15px;
}

.post img,.post video{
  width:100%;
  border-radius:10px;
}

input,button{
  width:90%;
  margin:5px auto;
  padding:10px;
  border-radius:8px;
  border:none;
  display:block;
}

button{
  background:#00e5ff;
  font-weight:bold;
}

.like-btn{
  background:#222;
  color:white;
  transition:0.2s;
}

.like-btn.active{
  background:red;
  transform:scale(1.1);
}

.profile{
  font-size:12px;
  opacity:0.8;
}

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#000;
  padding:10px;
}
</style>
</head>

<body>

<header>
  <h2>JhCloth</h2>
  <small>ELEGANCIA • DISCIPLINA • PRESENCIA</small>
</header>

<div id="auth">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="register()">Registrar</button>
  <button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none">

<h3 style="text-align:center">Crear Post</h3>

<input id="text" placeholder="Texto">
<input id="img" placeholder="Imagen URL">
<input id="video" placeholder="Video URL">
<button onclick="createPost()">Publicar</button>

<div id="feed"></div>

<button onclick="logout()">Salir</button>

</div>

<div class="nav">
<div>🏠</div>
<div>🔎</div>
<div>➕</div>
<div>❤️</div>
<div>👤</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
query,
orderBy,
doc,
updateDoc,
getDoc,
arrayUnion,
arrayRemove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_AUTH",
  projectId: "TU_PROJECT",
  storageBucket: "TU_BUCKET",
  messagingSenderId: "TU_ID",
  appId: "TU_APP"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const feed = document.getElementById("feed");

window.register = async () => {
  await createUserWithEmailAndPassword(auth,email.value,password.value);
};

window.login = async () => {
  await signInWithEmailAndPassword(auth,email.value,password.value);
};

window.logout = () => signOut(auth);

window.createPost = async () => {
  if(!auth.currentUser) return alert("Inicia sesión");

  await addDoc(collection(db,"posts"),{
    text:text.value,
    img:img.value||"",
    video:video.value||"",
    user:auth.currentUser.email,
    time:Date.now(),
    likes:[]
  });

  text.value="";
  img.value="";
  video.value="";
};

window.likePost = async (id)=>{
  const ref = doc(db,"posts",id);
  const snap = await getDoc(ref);
  const data = snap.data();

  const user = auth.currentUser.email;
  const liked = (data.likes||[]).includes(user);

  await updateDoc(ref,{
    likes: liked ? arrayRemove(user) : arrayUnion(user)
  });
};

const q = query(collection(db,"posts"),orderBy("time","desc"));

onSnapshot(q,(snap)=>{
  feed.innerHTML="";

  snap.forEach(d=>{
    const p=d.data();
    const user=p.user.split("@")[0];
    const currentUser=auth.currentUser?.email;
    const isLiked=(p.likes||[]).includes(currentUser);

    let media="";
    if(p.img) media+=`<img src="${p.img}">`;
    if(p.video) media+=`<video src="${p.video}" controls></video>`;

    feed.innerHTML+=`
      <div class="post">
        <div class="profile">@${user}</div>
        <p>${p.text}</p>
        ${media}

        <button class="like-btn ${isLiked?"active":""}"
        onclick="likePost('${d.id}')">
        ❤️ ${(p.likes||[]).length}
        </button>
      </div>
    `;
  });
});

onAuthStateChanged(auth,(user)=>{
  authDiv.style.display=user?"none":"block";
  appDiv.style.display=user?"block":"none";
});

</script>

</body>
</html>
