  margin:0;

  color:#fff;

header{

  border-bottom:1px solid #222;
}

header h1{
  margin:0;
  font-size:40px;
}

header p{
  color:#aaa;
}

/* FEED */
.feed{
  max-width:500px;
  margin:auto;
  padding:10px;
}

.post{
  background:#111;
  margin:15px 0;
  border-radius:15px;
  overflow:hidden;
}

  width:100%;
  height:260px;
  object-fit:cover;
  background:black;
}

.content{
  padding:10px;
}

.actions{
  display:flex;
  justify-content:space-around;
  padding:10px;
}

button{
  background:#222;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#333;
}

.count{
  text-align:center;
  color:#aaa;
  font-size:14px;
  padding-bottom:10px;
}

/* CHAT */
.chat{
  max-width:500px;
  margin:20px auto;
  padding:10px;
  background:#111;
  border-radius:15px;
}

.chat input{
  width:70%;
  padding:8px;
  border:none;
  border-radius:8px;
}

.chat button{
  width:25%;
}
</style>
</head>

<!-- CHAT -->
<div class="chat">

<div id="chatBox"></div>

<button onclick="sendMsg()">Enviar</button>
</div>

<script>
function like(btn){
  let count = btn.parentElement.querySelector(".count");
  if(!count){
    count = btn.parentElement.nextElementSibling;
  }

  let num = parseInt(count.innerText);
  if(isNaN(num)) num = 0;

  count.innerText = (num + 1) + " likes";
}

function comment(){
  alert("Comentarios pronto 🔥");
}

function share(){
  alert("Compartido 📤");
}

function sendMsg(){
  let input = document.getElementById("msg");
  let box = document.getElementById("chatBox");

  if(!input || !box){
    alert("Error: falta msg o chatBox");
    return;
  }

  if(input.value.trim() !== ""){
    let p = document.createElement("p");
    p.innerText = "👤 " + input.value;
    box.appendChild(p);
    input.value = "";
  }
}
</script>
