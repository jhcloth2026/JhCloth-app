<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>JhCloth PRO FINAL</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
}

header{
  text-align:center;
  padding:15px;
  color:#00e5ff;
  font-weight:bold;
}

#auth, #app{
  padding:10px;
}

input, button{
  width:95%;
  margin:5px auto;
  padding:10px;
  border-radius:8px;
  border:none;
  display:block;
}

button{
  background:#00e5ff;
  font-weight:bold;
  cursor:pointer;
}

.post{
  background:#111;
  margin:10px 0;
  padding:10px;
  border-radius:10px;
}

.profile{
  font-size:12px;
  opacity:0.7;
}

.like-btn.active{
  background:red;
}

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#000;
  padding:10px;
}
</style>
</head>

<body>

<header>
JhCloth PRO
</header>

<div id="auth">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Entrar</button>
  <button onclick="register()">Registrar</button>
</div>

<div id="app" style="display:none">

<h3>Crear Post</h3>
<input id="text" placeholder="Texto">
<input id="img" placeholder="Imagen URL">
<button onclick="createPost()">Publicar</button>

<div id="feed"></div>

<button onclick="logout()">Salir</button>
</div>

<div class="nav">
<div>🏠</div>
<div>🔎</div>
<div>➕</div>
<div>❤️</div>
<div>👤</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 TU CONFIG AQUÍ */
const firebaseConfig = {
  const firebaseConfig = {
  apiKey: "AIzaSyBQtm1v6ftwVbdtr8me3bK-fNq2gOmGjvk",
  authDomain: "jhcloth-app.firebaseapp.com",
  projectId: "jhcloth-app",
  storageBucket: "jhcloth-app.firebasestorage.app",
  messagingSenderId: "683518974253",
  appId: "1:683518974253:web:c9f2e789d00f5a2e6f9ba4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const feed = document.getElementById("feed");

/* LOGIN */
window.login = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
    alert("Bienvenido a JhCloth");
  } catch (e) {
    alert("Error login: " + e.message);
  }
};

/* REGISTER */
window.register = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await createUserWithEmailAndPassword(auth, email, password);
    alert("Usuario creado");
  } catch (e) {
    alert("Error register: " + e.message);
  }
};

/* LOGOUT */
window.logout = () => signOut(auth);

/* CREATE POST */
window.createPost = async () => {
  const text = document.getElementById("text").value;
  const img = document.getElementById("img").value;

  if(!auth.currentUser) return alert("Inicia sesión");

  await addDoc(collection(db,"posts"),{
    text,
    img,
    user: auth.currentUser.email,
    time: Date.now()
  });

  document.getElementById("text").value="";
  document.getElementById("img").value="";
};

/* FEED */
const q = query(collection(db,"posts"),orderBy("time","desc"));

onSnapshot(q,(snap)=>{
  feed.innerHTML="";

  snap.forEach(d=>{
    const p = d.data();

    feed.innerHTML += `
      <div class="post">
        <div class="profile">@${p.user}</div>
        <p>${p.text}</p>
        ${p.img ? `<img src="${p.img}" width="100%">` : ""}
      </div>
    `;
  });
});

/* STATE */
onAuthStateChanged(auth,(user)=>{
  document.getElementById("auth").style.display = user ? "none" : "block";
  document.getElementById("app").style.display = user ? "block" : "none";
});

</script>

</body>
</html>
