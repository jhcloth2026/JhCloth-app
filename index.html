<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>JhCloth PRO FINAL</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
}

header{
  text-align:center;
  padding:15px;
  color:#00e5ff;
  font-weight:bold;
}

#auth, #app{
  padding:10px;
}

input, button{
  width:95%;
  margin:5px auto;
  padding:10px;
  border-radius:8px;
  border:none;
  display:block;
}

button{
  background:#00e5ff;
  font-weight:bold;
  cursor:pointer;
}

.post{
  background:#111;
  margin:10px 0;
  padding:10px;
  border-radius:10px;
}

.profile{
  font-size:12px;
  opacity:0.7;
}
  .like{
  background:white;
  color:black;
}
  .delete-btn{
  background:#444;
  color:white;
  margin-top:5px;
}
.like.active{
  background:red;
  color:white;
}

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#000;
  padding:10px;
}
  .actions{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:8px;
  flex-wrap:wrap;
  }

.actions button{
  width:auto;
  padding:8px 12px;
  font-size:13px;
  border-radius:8px;
}
</style>
  
</head>
  
<body>

<header>
  JhCloth<br>
  <small>Elegancia • Disciplina • Presencia</small>
</header>

<div id="auth">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Entrar</button>
  <button onclick="register()">Registrar</button>
</div>

<div id="profilePage" style="display:none; padding:10px; background:#111; margin:10px; border-radius:10px;">
  <h2>👤 Perfil</h2>
  <input id="photoURL" placeholder="URL de tu foto">
  
<img id="profilePic" src="https://i.imgur.com/placeholder.png" width="100" style="border-radius:50%; border:3px solid #00e5ff;">

  <p id="profileUser"></p>

  <textarea id="bioInput" placeholder="Escribe tu bio..." style="width:95%; padding:8px; border-radius:8px;"></textarea>

  <button onclick="saveBio()">Guardar bio</button>

  <p id="bioText">Bio: Elegancia • Disciplina • Presencia</p>

  <button onclick="closeProfile()">Cerrar</button>
</div>

<div id="app" style="display:none">

  <h3>Crear Post</h3>
  <input id="text" placeholder="Texto">
  <input id="img" placeholder="Imagen URL">
  <button onclick="createPost()">Publicar</button>

  <div id="feed"></div>

  <button onclick="logout()">Salir</button>

</div>

<div class="nav">
<div>🏠</div>
<div>🔎</div>
<div>➕</div>
<div>❤️</div>
<div onclick="showProfile()">👤</div>
</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
query,
orderBy,
doc,
getDoc,
updateDoc,
arrayUnion,
arrayRemove,
deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 FIREBASE CONFIG */
  
const firebaseConfig = {
apiKey: "AIzaSyBQtm1v6ftwVbdtr8me3bK-fNq2gOmGjvk",
authDomain: "jhcloth-app.firebaseapp.com",
projectId: "jhcloth-app",
storageBucket: "jhcloth-app.firebasestorage.app",
messagingSenderId: "683518974253",
appId: "1:683518974253:web:c9f2e789d00f5a2e6f9ba4"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const feed = document.getElementById("feed");
  window.deletePost = async (id) => {
  const ok = confirm("¿Seguro que quieres eliminar este post?");
  if (!ok) return;

  await deleteDoc(doc(db, "posts", id));
};

/* ---------------- AUTH ---------------- */

window.register = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await createUserWithEmailAndPassword(auth, email, password);
    alert("Usuario creado ✔");
  } catch (e) {
    alert(e.message);
  }
};

window.login = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
    alert("Bienvenido a JhCloth 🚀");
  } catch (e) {
    alert(e.message);
  }
};

window.showProfile = () => {
  const user = auth.currentUser?.email.split("@")[0] || "Usuario";

  document.getElementById("profileUser").textContent = "@" + user;
  document.getElementById("profilePage").style.display = "block";
};

window.saveBio = () => {
  const bio = document.getElementById("bioInput").value;
  const foto = document.getElementById("photoURL").value;

  document.getElementById("bioText").textContent = "Bio: " + bio;

  if(foto){
    document.getElementById("profilePic").src = foto;
  }
};
window.logout = async () => {
  await signOut(auth);
};

window.closeProfile = () => {
  document.getElementById("profilePage").style.display = "none";
};

/* ---------------- POST ---------------- */

window.createPost = async () => {
  const text = document.getElementById("text").value;
  const img = document.getElementById("img").value;

  if (!auth.currentUser) return alert("Inicia sesión");

  await addDoc(collection(db, "posts"), {
    text,
    img,
    user: auth.currentUser.email,
    time: Date.now(),
    likes: [],
    comments: []
  });

  document.getElementById("text").value = "";
  document.getElementById("img").value = "";
};

/* ---------------- LIKE ---------------- */

window.likePost = async (id) => {
  const ref = doc(db, "posts", id);
  const snap = await getDoc(ref);
  const data = snap.data();

  const user = auth.currentUser.email;
  const liked = (data.likes || []).includes(user);

  await updateDoc(ref, {
    likes: liked ? arrayRemove(user) : arrayUnion(user)
  });
};

/* ---------------- COMMENT ---------------- */

window.commentPost = async (id) => {
  const input = document.getElementById("c-" + id);
  if (!input.value) return;

  const ref = doc(db, "posts", id);
  const snap = await getDoc(ref);
  const data = snap.data();

  const comment = auth.currentUser.email + ": " + input.value;

  await updateDoc(ref, {
    comments: [...(data.comments || []), comment]
  });

  input.value = "";
};

/* ---------------- FEED ---------------- */

const q = query(collection(db, "posts"), orderBy("time", "desc"));

onSnapshot(q, (snap) => {
  feed.innerHTML = "";

  snap.forEach((d) => {
    const p = d.data();
    const name = p.user.split("@")[0];
    const current = auth.currentUser?.email;

    const isLiked = (p.likes || []).includes(current);

    feed.innerHTML += `
      <div class="post">

 <div class="profile">
  👤 @${name}<br>
  🕒 ${new Date(p.time).toLocaleString()}
</div>

        <p>${p.text}</p>

        ${p.img ? `<img src="${p.img}" width="100%">` : ""}

        ${(p.comments || []).map(c => `<p style="font-size:12px">💬 ${c}</p>`).join("")}

        <div class="actions">

          <button class="like ${isLiked ? 'active' : ''}" onclick="likePost('${d.id}')">
            ❤️ ${(p.likes || []).length}
          </button>

          <input id="c-${d.id}" placeholder="Escribe comentario">

          <button onclick="commentPost('${d.id}')">
            💬 Comentar
          </button>

          ${p.user === auth.currentUser.email ? `
            <button class="delete-btn" onclick="deletePost('${d.id}')">
              🗑️ Eliminar
            </button>
          ` : ""}

        </div>
      </div>
    `;
  });
});

/* ---------------- AUTH STATE ---------------- */

onAuthStateChanged(auth, (user) => {
  document.getElementById("auth").style.display = user ? "none" : "block";
  document.getElementById("app").style.display = user ? "block" : "none";
});
  

</script>

</body>
</html>
