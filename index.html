<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>JhCloth | Elegancia, Disciplina, Presencia</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#0d0d0d;
  color:white;
  padding-bottom:80px;
}

h2{
  text-align:center;
  margin-top:20px;
  color:#00e5ff;
}

.subtitle{
  text-align:center;
  font-size:14px;
  opacity:0.7;
  margin-bottom:10px;
}

#login{
  text-align:center;
  padding:20px;
}

input{
  width:90%;
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
}

.post{
  background:#1a1a1a;
  margin:15px auto;
  width:95%;
  max-width:600px;
  padding:15px;
  border-radius:15px;
}

.post img,
.post video,
.post iframe{
  width:100%;
  height:400px;
  object-fit:cover;
  border-radius:12px;
  margin-top:10px;
}

.navbar{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#000;
  padding:10px;
}
.navbar button{
  background:none;
  color:white;
  font-size:22px;
}
</style>
</head>

<body>

<div id="login">
  <h2>JhCloth</h2>
  <div class="subtitle">Elegancia • Disciplina • Presencia</div>

  <input id="email" placeholder="Email"><br>
  <input id="password" placeholder="Password"><br>

  <button onclick="register()">Registrar</button>
  <button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none;">

<h2>JhCloth</h2>

<h3>Crear post de moda</h3>

<input id="postText" placeholder="Comparte tu estilo..."><br>
<input id="postMedia" placeholder="Imagen, Video o YouTube URL"><br>

<button onclick="createPost()">Publicar ➕</button>

<h4>Posts: <span id="totalPosts">0</span></h4>

<div id="feed"></div>

<button onclick="logout()">Salir</button>

</div>

<div class="navbar">
<button onclick="goHome()">🏠</button>
<button onclick="search()">🔎</button>
<button onclick="createPost()">➕</button>
<button>❤️</button>
<button>👤</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
query,
orderBy,
doc,
updateDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "TU_API_KEY",
authDomain: "TU_PROJECT.firebaseapp.com",
projectId: "TU_PROJECT",
storageBucket: "TU_PROJECT.appspot.com",
messagingSenderId: "XXXX",
appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const feed = document.getElementById("feed");

/* AUTH */
window.register = () => {
createUserWithEmailAndPassword(auth, email.value, password.value);
};

window.login = () => {
signInWithEmailAndPassword(auth, email.value, password.value);
};

window.logout = () => signOut(auth);

/* CREATE POST */
window.createPost = async () => {
if(!postText.value.trim()) return;

await addDoc(collection(db,"posts"),{
texto: postText.value,
media: postMedia.value,
fecha: Date.now(),
usuario: auth.currentUser?.email || "JhCloth",
likes:0,
likesList:[],
comentarios:[]
});

postText.value="";
postMedia.value="";
};

/* FEED */
const q = query(collection(db,"posts"),orderBy("fecha","desc"));

onSnapshot(q,(snapshot)=>{
feed.innerHTML="";
document.getElementById("totalPosts").innerText=snapshot.size;

snapshot.forEach(docSnap=>{
const p = docSnap.data();

let mediaHTML = "";

if(p.media){

if(p.media.includes("youtube")){
let id = p.media.split("v=")[1] || "";
mediaHTML = `<iframe src="https://www.youtube.com/embed/${id}" width="100%" height="300"></iframe>`;
}
else if(p.media.includes(".mp4")){
mediaHTML = `<video src="${p.media}" controls></video>`;
}
else{
mediaHTML = `<img src="${p.media}">`;
}
}

feed.innerHTML += `
<div class="post">
<b>@${p.usuario}</b>
<p>${p.texto}</p>
${mediaHTML}
</div>
`;
});
});

onAuthStateChanged(auth,(user)=>{
document.getElementById("login").style.display=user?"none":"block";
document.getElementById("app").style.display=user?"block":"none";
});

window.goHome=()=>location.reload();
window.search=()=>alert("Buscar 🔎");

</script>

</body>
</html>
