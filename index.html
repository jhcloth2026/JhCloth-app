
<!doctype html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JHCLOTH</title><style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Arial,sans-serif;
}

#login{
  text-align:center;
  padding-top:80px;
}

input{
  display:block;
  margin:10px auto;
  padding:12px;
  width:80%;
  max-width:300px;
  border:none;
  border-radius:10px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#222;
  color:white;
  cursor:pointer;
  margin:5px;
}

#app{
  display:none;
}

header{
  text-align:center;
  padding:15px;
  font-size:28px;
  font-weight:bold;
}

#feed{
  max-width:600px;
  margin:auto;
}

.post{
  background:#111;
  margin:15px;
  border-radius:15px;
  overflow:hidden;
}

.post img{
  width:100%;
  display:block;
}

.post h3{
  padding:10px;
  margin:0;
}

.post p{
  padding:0 10px 15px;
  color:#ccc;
}
</style></head><body><div id="login">
<h1>JHCLOTH</h1><input id="email" placeholder="Correo">
<input id="password" type="password" placeholder="Contraseña"><button onclick="register()">Registrarse</button>
<button onclick="login()">Entrar</button>

</div><div id="app"><header>JHCLOTH</header><div id="feed"><div class="post">
<img src="https://images.unsplash.com/photo-1523398002811-999ca8dec234?w=800">
<h3>Moda urbana</h3>
<p>Elegancia · Disciplina · Presencia</p>
</div><div class="post">
<img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=800">
<h3>Nueva colección</h3>
<p>Estilo único JhCloth</p>
</div></div><div style="text-align:center;padding:20px;">
<button onclick="logout()">Salir</button>
</div></div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBQtm1v6ftwVbdtr8me3bK-fNq2gOmGjvk",
authDomain: "jhcloth-app.firebaseapp.com",
projectId: "jhcloth-app",
storageBucket: "jhcloth-app.firebasestorage.app",
messagingSenderId: "683518974253",
appId: "1:683518974253:web:c9f2e789d00f5a2e6f9ba4",
measurementId: "G-G95JWS0LXR"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.register = function(){
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

createUserWithEmailAndPassword(auth,email,password)
.then(()=>alert("Usuario creado"))
.catch(error=>alert(error.message));
}

window.login = function(){
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)
.catch(error=>alert(error.message));
}

window.logout = function(){
signOut(auth);
}

onAuthStateChanged(auth,(user)=>{
if(user){
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
}else{
document.getElementById("login").style.display="block";
document.getElementById("app").style.display="none";
}
});

</script></body>
</html>
