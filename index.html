<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>JhCloth Social GOD MODE</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
}

/* HEADER */
header{
  text-align:center;
  padding:15px;
  color:#00e5ff;
}

/* FEED */
#feed{
  height:100vh;
  overflow-y:auto;
  scroll-snap-type:y mandatory;
}

/* POST */
.post{
  background:#111;
  margin:10px;
  padding:10px;
  border-radius:15px;
  scroll-snap-align:start;
}

/* MEDIA */
.post img,
.post video{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

/* BUTTONS */
button{
  width:90%;
  margin:5px auto;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#00e5ff;
  font-weight:bold;
}

/* LIKE */
.like-btn{
  background:#222;
  color:white;
  transition:0.2s;
}

.like-btn.active{
  background:red;
  transform:scale(1.1);
}

/* PROFILE */
.profile{
  opacity:0.8;
  font-size:12px;
  cursor:pointer;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#000;
  padding:10px;
}
</style>
</head>

<body>

<header>
  <h2>JhCloth</h2>
  <small>ELEGANCIA • DISCIPLINA • PRESENCIA</small>
</header>

<!-- AUTH -->
<div id="auth">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="register()">Registrar</button>
  <button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<h3 style="text-align:center">Crear Post</h3>

<input id="text" placeholder="Texto">
<input id="img" placeholder="Imagen URL">
<input id="video" placeholder="Video URL">
<button onclick="createPost()">Publicar</button>

<div id="feed"></div>

<button onclick="logout()">Salir</button>

</div>

<!-- NAV -->
<div class="nav">
<div>🏠</div>
<div>🔎</div>
<div>➕</div>
<div>❤️</div>
<div>👤</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
query,
orderBy,
doc,
updateDoc,
getDoc,
arrayUnion,
arrayRemove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_AUTH",
  projectId: "TU_PROJECT",
  storageBucket: "TU_BUCKET",
  messagingSenderId: "TU_ID",
  appId: "TU_APP"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const feed = document.getElementById("feed");
const authDiv = document.getElementById("auth");
const appDiv = document.getElementById("app");

/* AUTH */
window.register = async () => {
  await createUserWithEmailAndPassword(auth,email.value,password.value);
};

window.login = async () => {
  await signInWithEmailAndPassword(auth,email.value,password.value);
};

window.logout = () => signOut(auth);

/* CREATE POST */
window.createPost = async () => {
  if(!text.value.trim()) return;
  if(!auth.currentUser) return alert("Inicia sesión");

  await addDoc(collection(db,"posts"),{
    text:text.value,
    img:img.value || "",
    video:video.value || "",
    user:auth.currentUser.email,
    username:auth.currentUser.email.split("@")[0],
    time:Date.now(),
    likes:[]
  });

  text.value="";
  img.value="";
  video.value="";
};

/* LIKE SYSTEM */
window.likePost = async (id)=>{

  const ref = doc(db,"posts",id);
  const snap = await getDoc(ref);
  const data = snap.data();

  const user = auth.currentUser?.email;
  if(!user) return;

  const liked = (data.likes || []).includes(user);

  if(liked){
    await updateDoc(ref,{
      likes: arrayRemove(user)
    });
  } else {
    await updateDoc(ref,{
      likes: arrayUnion(user)
    });
  }
};

/* FEED */
const q = query(collection(db,"posts"),orderBy("time","desc"));

onSnapshot(q,(snap)=>{

  feed.innerHTML="";

  snap.forEach(d=>{
    const p = d.data();
    const user = p.user.split("@")[0];

    const currentUser = auth.currentUser?.email;
    const isLiked = (p.likes || []).includes(currentUser);

    let media = "";
    if(p.img) media += `<img src="${p.img}">`;
    if(p.video) media += `<video src="${p.video}" controls></video>`;

    feed.innerHTML += `
      <div class="post">

        <div class="profile">@${user}</div>

        <p>${p.text}</p>

        ${media}

        <button 
          class="like-btn ${isLiked ? "active" : ""}" 
          onclick="likePost('${d.id}')"
        >
          ❤️ ${(p.likes||[]).length}
        </button>

      </div>
    `;
  });

});

/* AUTH STATE */
onAuthStateChanged(auth,(user)=>{
  if(user){
    authDiv.style.display="none";
    appDiv.style.display="block";
  }else{
    authDiv.style.display="block";
    appDiv.style.display="none";
  }
});

</script>

</body>
</html>
