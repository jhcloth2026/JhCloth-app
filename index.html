<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JhCloth Social</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
}

header{
  text-align:center;
  padding:15px;
  border-bottom:1px solid #222;
}

header h1{ margin:0; font-size:40px; }
header p{ color:#aaa; }

.feed{
  max-width:500px;
  margin:auto;
  padding:10px;
}

.post{
  background:#111;
  margin:15px 0;
  border-radius:15px;
  overflow:hidden;
}

.post img,
.post video{
  width:100%;
  height:260px;
  object-fit:cover;
}

.content{
  padding:10px;
}

.actions{
  display:flex;
  justify-content:space-around;
  padding:10px;
}

button{
  background:#222;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
}

button:hover{ background:#333; }

.count{
  text-align:center;
  color:#aaa;
  font-size:14px;
  padding-bottom:10px;
}

.loader{
  text-align:center;
  padding:20px;
  color:#aaa;
}
</style>
</head>

<body>

<header>
<h1>JHCLOTH</h1>
<p>Elegancia · Disciplina · Presencia</p>
</header>

<div class="feed" id="feed"></div>

<div class="loader" id="loader">Cargando más contenido...</div>

<script>
// ======================
// BASE DE DATOS SIMULADA
// ======================
const database = [
  {
    type:"image",
    url:"https://source.unsplash.com/600x400/?fashion,street",
    title:"Moda urbana",
    text:"La elegancia no depende del precio."
  },
  {
    type:"video",
    url:"https://www.w3schools.com/html/mov_bbb.mp4",
    title:"JhCloth Style",
    text:"Disciplina y presencia siempre."
  },
  {
    type:"image",
    url:"https://source.unsplash.com/600x400/?model,style",
    title:"Nueva colección",
    text:"Estilo único JhCloth."
  }
];

// ======================
// CONTROL INFINITO
// ======================
let index = 0;
const feed = document.getElementById("feed");

// ======================
// CREAR POST
// ======================
function createPost(data){

  const div = document.createElement("div");
  div.className = "post";

  let media = "";

  if(data.type === "image"){
    media = `<img src="${data.url}">`;
  }else{
    media = `
      <video controls muted loop>
        <source src="${data.url}">
      </video>
    `;
  }

  div.innerHTML = `
    ${media}
    <div class="content">
      <h3>${data.title}</h3>
      <p>${data.text}</p>
    </div>

    <div class="actions">
      <button onclick="like(this)">❤️ Like</button>
      <button onclick="share()">📤</button>
    </div>

    <div class="count">0 likes</div>
  `;

  feed.appendChild(div);
}

// ======================
// CARGAR MÁS CONTENIDO
// ======================
function loadMore(){
  for(let i=0;i<3;i++){
    const data = database[index % database.length];
    createPost(data);
    index++;
  }
}

// primera carga
loadMore();

// ======================
// SCROLL INFINITO REAL
// ======================
window.addEventListener("scroll", () => {
  if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 100){
    loadMore();
  }
});

// ======================
// LIKE
// ======================
function like(btn){
  let post = btn.closest(".post");
  let count = post.querySelector(".count");

  let num = parseInt(count.innerText);
  if(isNaN(num)) num = 0;

  count.innerText = (num + 1) + " likes";
}

// ======================
// SHARE
// ======================
function share(){
  alert("Compartido 📤");
}
</script>

</body>
</html>
