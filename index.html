<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JhCloth TikTok Style</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
}

header{
  text-align:center;
  padding:10px;
  border-bottom:1px solid #222;
}

.feed{
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

.post{
  height:100vh;
  scroll-snap-align:start;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

.post img,
.post video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.info{
  position:absolute;
  bottom:60px;
  left:15px;
  color:white;
}

.like{
  position:absolute;
  right:15px;
  bottom:100px;
}

button{
  background:#222;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
<h1>JHCLOTH</h1>
</header>

<div class="feed" id="feed"></div>

<script>

// 📦 VIDEOS E IMÁGENES
const posts = [
  {
    type:"video",
    url:"https://www.w3schools.com/html/mov_bbb.mp4",
    title:"JhCloth Style",
    text:"Disciplina y presencia"
  },
  {
    type:"image",
    url:"https://source.unsplash.com/600x900/?fashion",
    title:"Moda urbana",
    text:"Elegancia pura"
  },
  {
    type:"video",
    url:"https://www.w3schools.com/html/movie.mp4",
    title:"Nueva colección",
    text:"Estilo único"
  }
];

const feed = document.getElementById("feed");

// 🔥 CREAR POSTS
posts.forEach(p => {

  const div = document.createElement("div");
  div.className = "post";

  let media = "";

  if(p.type === "video"){
    media = `<video muted loop playsinline>
              <source src="${p.url}">
             </video>`;
  } else {
    media = `<img src="${p.url}">`;
  }

  div.innerHTML = `
    ${media}
    <div class="info">
      <h2>${p.title}</h2>
      <p>${p.text}</p>
    </div>

    <div class="like">
      <button>❤️ Like</button>
    </div>
  `;

  feed.appendChild(div);
});

// 🔥 AUTOPLAY TIPO TIKTOK
const videos = document.querySelectorAll("video");

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.play();
    } else {
      entry.target.pause();
    }
  });
}, { threshold: 0.7 });

videos.forEach(v => observer.observe(v));

</script>

</body>
</html>
