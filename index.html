
  <div><!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JHCLOTH</title>

<style>

body{
  margin:0;
  background:#000;
  color:white;
  font-family:Arial, sans-serif;
}

header{
  background:#111;
  padding:15px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
  color:#d4af37;
  border-bottom:1px solid #333;
}

.perfil{
  text-align:center;
  padding:20px;
}

.perfil img{
  width:120px;
  height:120px;
  border-radius:50%;
  border:3px solid #d4af37;
}

.perfil h2{
  margin:10px 0 5px;
}

.perfil p{
  color:#bbb;
}

input{
  display:block;
  margin:10px auto;
  padding:12px;
  width:90%;
  max-width:500px;
  border:none;
  border-radius:10px;
}

button{
  background:#d4af37;
  color:black;
  border:none;
  border-radius:10px;
  padding:10px 15px;
  font-weight:bold;
  cursor:pointer;
}

.post{
  background:#111;
  max-width:600px;
  margin:15px auto;
  padding:15px;
  border-radius:15px;
  border:1px solid #333;
}

.post img{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}
  #feed{
  max-width:600px;
  margin:auto;
  padding-bottom:30px;
}

  #login{
  text-align:center;
  padding-top:80px;
}

#app{
  display:none;
}
  .navbar{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#111;
  border-top:1px solid #333;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}

.navbar button{
  background:none;
  border:none;
  color:#d4af37;
  font-size:24px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- ================= LOGIN ================= -->
<div id="login">
<h1>JHCLOTH</h1>

<input id="email" placeholder="Correo">
<input id="password" type="password" placeholder="Contraseña">

<button onclick="register()">Registrarse</button>
<button onclick="login()">Entrar</button>
</div>

<!-- ================= APP ================= -->
<div id="app">

<header>JHCLOTH</header>

<div class="perfil">

<img src="https://images.unsplash.com/photo-1523398002811-999ca8dec234?w=500">

<h2>JhCloth</h2>

<p>Elegancia • Disciplina • Presencia</p>

<div style="display:flex;justify-content:center;gap:25px;margin-top:15px;">
  <div>
    <strong id="totalPosts">0</strong><br>
Publicaciones
  </div>

  <div>
    <strong>0</strong><br>
    Seguidores
  </div>

    <strong>0</strong><br>
    Siguiendo
  </div>
</div>

</div>

<div style="text-align:center">
<input id="postText" placeholder="¿Qué estás pensando?">
<input id="postImage" placeholder="URL de imagen (opcional)">
<button onclick="createPost()">Publicar</button>
</div>

<div id="feed"></div>

<div style="text-align:center;margin:20px;">
<button onclick="logout()">Salir</button>
</div>

</div>

<!-- ================= FIREBASE ================= -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  doc,
  updateDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ================= FIREBASE CONFIG ================= */
const firebaseConfig = {
  apiKey: "AIzaSyBQtm1v6ftwVbdtr8me3bK-fNq2gOmGjvk",
  authDomain: "jhcloth-app.firebaseapp.com",
  projectId: "jhcloth-app",
  storageBucket: "jhcloth-app.firebasestorage.app",
  messagingSenderId: "683518974253",
  appId: "1:683518974253:web:c9f2e789d00f5a2e6f9ba4",
  measurementId: "G-G95JWS0LXR"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ================= REGISTRO ================= */
window.register = () => {
  createUserWithEmailAndPassword(auth, email.value, password.value)
    .then(() => alert("Usuario creado 🔥"))
    .catch(e => alert(e.message));
};

/* ================= LOGIN ================= */
window.login = () => {
  signInWithEmailAndPassword(auth, email.value, password.value)
    .then(() => alert("Entraste correctamente 🔥"))
    .catch(e => alert(e.message));
};

/* ================= LOGOUT ================= */
window.logout = () => {
  signOut(auth);
};

/* ================= CREAR POST ================= */
window.createPost = async () => {
  const texto = postText.value;
  const imagen = postImage.value;

  if (!texto.trim()) return;

  await addDoc(collection(db, "posts"), {
    texto,
    imagen,
    fecha: Date.now(),
    usuario: "JhCloth",
    likes: 0,
    comentarios: []
  });

  postText.value = "";
  postImage.value = "";
};

/* ================= LIKE (INSTAGRAM STYLE) ================= */
  window.addComment = async (id) => {
  const input = document.getElementById("c-" + id);
  const texto = input.value;

  if (!texto.trim()) return;

  const postRef = doc(db, "posts", id);
  const snap = await getDoc(postRef);
  const data = snap.data();

  const nuevos = data.comentarios || [];
  nuevos.push(texto);

  await updateDoc(postRef, {
    comentarios: nuevos
  });

  input.value = "";
};

const q = query(collection(db, "posts"), orderBy("fecha", "desc"));

onSnapshot(q, (snapshot) => {

  feed.innerHTML = "";

  document.getElementById("totalPosts").innerText = snapshot.size;

  snapshot.forEach(docSnap => {

    const p = docSnap.data();

    feed.innerHTML += `
      <div class="post">

        <div style="font-weight:bold;margin-bottom:5px;">
          @${p.usuario}
        </div>

        <p>${p.texto}</p>

        ${p.imagen ? `
          <img src="${p.imagen}" style="width:100%;border-radius:10px;margin-top:10px;">
        ` : ""}

        <div style="margin-top:10px;">
          <button onclick="likePost('${docSnap.id}')" style="background:none;border:none;color:#d4af37;font-size:18px;">
            ❤️ ${p.likes || 0} Me gusta
          </button>
        </div>

        <div style="margin-top:10px;">
          <input id="c-${docSnap.id}" placeholder="Escribe comentario"
          style="width:100%;padding:8px;border-radius:8px;">
          <button onclick="addComment('${docSnap.id}')">Comentar</button>
        </div>

        <div style="margin-top:10px;">
          ${(p.comentarios || [])
            .map(c => `<p>💬 ${c}</p>`)
            .join("")}
        </div>

      </div>
    `;
  });

});
/* ================= SESIÓN ================= */
onAuthStateChanged(auth, (user) => {
if (user) {
document.getElementById("login").style.display = "none";
document.getElementById("app").style.display = "block";
} else {
document.getElementById("login").style.display = "block";
document.getElementById("app").style.display = "none";

}
});
    

</script>
  <div class="navbar">
  <button>🏠</button>
  <button>🔍</button>
  <button>➕</button>
  <button>❤️</button>
  <button>👤</button>
  </div>

</body>
</html>
