<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>JhCloth PRO MAX</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:white;
  padding-bottom:90px;
}

.header{
  text-align:center;
  padding:15px;
  font-size:22px;
  color:#00e5ff;
  font-weight:bold;
}

.feed{
  max-width:600px;
  margin:auto;
}

.post{
  background:#1a1a1a;
  margin:15px;
  padding:12px;
  border-radius:15px;
}

.post img, .post video, iframe{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

input, button{
  width:90%;
  margin:5px auto;
  display:block;
  padding:10px;
  border-radius:8px;
  border:none;
}

button{
  background:#00e5ff;
  cursor:pointer;
  font-weight:bold;
}

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#000;
  padding:10px;
  font-size:20px;
}
</style>
</head>

<body>

<div class="header">JhCloth PRO MAX</div>

<div id="auth">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="register()">Registrar</button>
  <button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none">

<h3 style="text-align:center">Crear Post</h3>

<input id="text" placeholder="Texto">
<input id="img" placeholder="Imagen URL">
<input id="video" placeholder="Video o YouTube URL">
<button onclick="createPost()">Publicar</button>

<h4 style="text-align:center">Feed</h4>

<div id="feed" class="feed"></div>

<button onclick="logout()">Salir</button>
</div>

<div class="nav">
<div>🏠</div>
<div>🔎</div>
<div>➕</div>
<div>❤️</div>
<div>👤</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
query,
orderBy,
doc,
updateDoc,
getDoc,
arrayUnion,
arrayRemove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"TU_API",
authDomain:"TU_DOMAIN",
projectId:"TU_ID",
storageBucket:"TU_BUCKET",
appId:"TU_APP"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const feed = document.getElementById("feed");

/* AUTH */
window.register = async ()=>{
await createUserWithEmailAndPassword(auth,email.value,password.value);
};

window.login = async ()=>{
await signInWithEmailAndPassword(auth,email.value,password.value);
};

window.logout = ()=>signOut(auth);

/* POST */
window.createPost = async ()=>{
if(!text.value.trim()) return;

await addDoc(collection(db,"posts"),{
text:text.value,
img:img.value,
video:video.value,
user:auth.currentUser.email,
time:Date.now(),
likes:[]
});

text.value="";
img.value="";
video.value="";
};

/* LIKE */
window.likePost = async (id)=>{
const ref = doc(db,"posts",id);
const snap = await getDoc(ref);
const data = snap.data();

const user = auth.currentUser.email;
const likes = data.likes || [];

if(likes.includes(user)){
await updateDoc(ref,{likes:arrayRemove(user)});
}else{
await updateDoc(ref,{likes:arrayUnion(user)});
}
};

/* FEED */
const q = query(collection(db,"posts"),orderBy("time","desc"));

onSnapshot(q,(snap)=>{
feed.innerHTML="";

snap.forEach(d=>{
const p=d.data();

let media="";

if(p.img) media+=`<img src="${p.img}">`;

if(p.video){
if(p.video.includes("youtube")){
let id = p.video.includes("watch?v=")
? p.video.split("watch?v=")[1].split("&")[0]
: p.video.split("youtu.be/")[1];

media+=`<iframe height="300" src="https://www.youtube.com/embed/${id}"></iframe>`;
}else{
media+=`<video src="${p.video}" controls></video>`;
}
}

feed.innerHTML+=`
<div class="post">
<b>@${p.user.split("@")[0]}</b>
<p>${p.text}</p>
${media}

<button onclick="likePost('${d.id}')">
❤️ ${(p.likes||[]).length}
</button>
</div>
`;
});
});

/* AUTH STATE */
onAuthStateChanged(auth,(user)=>{
auth.style.display=user?"none":"block";
app.style.display=user?"block":"none";
});

</script>

</body>
</html>
