<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JHCLOTH</title>

<style>
body{
  margin:0;
  background:black;
  font-family:Arial;
  color:white;
}

/* HEADER */
header{
  text-align:center;
  padding:10px;
  font-weight:bold;
}

/* FEED */
#feed{
  max-width:500px;
  margin:auto;
}

/* POST */
.post{
  position:relative;
  margin-bottom:20px;
}

/* VIDEO FULL */
.post video,
.post img{
  width:100%;
  height:80vh;
  object-fit:cover;
  border-radius:15px;
}

/* INFO */
.info{
  position:absolute;
  bottom:80px;
  left:10px;
}

.info h3{
  margin:0;
}

.info p{
  font-size:13px;
  color:#ccc;
}

/* BUTTONS */
.actions{
  position:absolute;
  right:10px;
  bottom:100px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.actions button{
  background:rgba(0,0,0,0.5);
  border:none;
  color:white;
  padding:10px;
  border-radius:50%;
  font-size:18px;
}

/* LOADER */
.loader{
  text-align:center;
  padding:20px;
  color:gray;
}
</style>
</head>

<body>

<header>JHCLOTH</header>

<div id="feed"></div>
<div class="loader">Cargando más videos...</div>

<script>

const data = [
  {
    type:"video",
    url:"https://www.w3schools.com/html/mov_bbb.mp4",
    title:"JhCloth Style",
    text:"Disciplina y presencia"
  },
  {
    type:"image",
    url:"https://source.unsplash.com/600x900/?fashion",
    title:"Moda urbana",
    text:"Elegancia real"
  },
  {
    type:"video",
    url:"https://www.w3schools.com/html/movie.mp4",
    title:"Nueva colección",
    text:"Estilo único"
  }
];

let index = 0;
const feed = document.getElementById("feed");

function createPost(item){

  const div = document.createElement("div");
  div.className = "post";

  let media = "";

  if(item.type === "video"){
    media = `<video src="${item.url}" autoplay muted loop></video>`;
  }else{
    media = `<img src="${item.url}">`;
  }

  div.innerHTML = `
    ${media}

    <div class="info">
      <h3>${item.title}</h3>
      <p>${item.text}</p>
    </div>

    <div class="actions">
      <button onclick="like(this)">❤️</button>
      <button>💬</button>
      <button>📤</button>
    </div>
  `;

  feed.appendChild(div);
}

function loadMore(){
  for(let i=0;i<3;i++){
    createPost(data[index % data.length]);
    index++;
  }
}

loadMore();

window.addEventListener("scroll", ()=>{
  if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 200){
    loadMore();
  }
});

function like(btn){
  btn.style.transform = "scale(1.3)";
  setTimeout(()=>btn.style.transform="scale(1)",200);
}

</script>

</body>
</html>
