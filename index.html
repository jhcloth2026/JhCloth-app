
<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JhCloth Social</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
}

/* HEADER */
header{
  text-align:center;
  padding:15px;
  border-bottom:1px solid #222;
}

header h1{
  margin:0;
  font-size:40px;
}

header p{
  color:#aaa;
}

/* FEED */
.feed{
  max-width:500px;
  margin:auto;
  padding:10px;
}

.post{
  background:#111;
  margin:15px 0;
  border-radius:15px;
  overflow:hidden;
}

.post img,
.post video{
  width:100%;
  height:260px;
  object-fit:cover;
}

.content{
  padding:10px;
}

.actions{
  display:flex;
  justify-content:space-around;
  padding:10px;
}

button{
  background:#222;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#333;
}

.count{
  text-align:center;
  color:#aaa;
  font-size:14px;
  padding-bottom:10px;
}

/* CHAT */
.chat{
  max-width:500px;
  margin:20px auto;
  padding:10px;
  background:#111;
  border-radius:15px;
}

.chat input{
  width:70%;
  padding:8px;
  border:none;
  border-radius:8px;
}

.chat button{
  width:25%;
}
</style>
</head>

<body>

<header>
<h1>JHCLOTH</h1>
<p>Elegancia · Disciplina · Presencia</p>
</header>

<!-- FEED -->
<div class="feed" id="feed"></div>

<!-- CHAT -->
<div class="chat">
<h3>Mensajes</h3>
<div id="chatBox"></div>

<input id="msg" placeholder="Escribe un mensaje...">
<button onclick="sendMsg()">Enviar</button>
</div>

<script>
// =======================
// POSTS (IMÁGENES + VIDEOS)
// =======================
const posts = [
  {
    type: "image",
    url: "https://source.unsplash.com/600x400/?fashion,street",
    title: "Moda urbana",
    text: "La elegancia no depende del precio."
  },
  {
    type: "video",
    url: "https://www.w3schools.com/html/mov_bbb.mp4",
    title: "JhCloth Style",
    text: "Disciplina y presencia siempre."
  },
  {
    type: "image",
    url: "https://source.unsplash.com/600x400/?model,style",
    title: "Nueva colección",
    text: "Estilo único JhCloth."
  }
];

// =======================
// CREAR FEED AUTOMÁTICO
// =======================
const feed = document.getElementById("feed");

posts.forEach(post => {
  const div = document.createElement("div");
  div.className = "post";

  let media = "";

  if(post.type === "image"){
    media = `<img src="${post.url}">`;
  } else {
    media = `
      <video controls>
        <source src="${post.url}">
      </video>
    `;
  }

  div.innerHTML = `
    ${media}

    <div class="content">
      <h3>${post.title}</h3>
      <p>${post.text}</p>
    </div>

    <div class="actions">
      <button onclick="like(this)">❤️ Like</button>
      <button onclick="share()">📤</button>
    </div>

    <div class="count">0 likes</div>
  `;

  feed.appendChild(div);
});

// =======================
// LIKE
// =======================
function like(btn){
  let post = btn.closest(".post");
  let count = post.querySelector(".count");

  let num = parseInt(count.innerText);
  if(isNaN(num)) num = 0;

  count.innerText = (num + 1) + " likes";
}

// =======================
// SHARE
// =======================
function share(){
  alert("Compartido 📤");
}

// =======================
// CHAT
// =======================
function sendMsg(){
  let input = document.getElementById("msg");
  let box = document.getElementById("chatBox");

  if(input.value.trim() !== ""){
    let p = document.createElement("p");
    p.innerText = "👤 " + input.value;
    box.appendChild(p);
    input.value = "";
  }
}
</script>

</body>
</html>
