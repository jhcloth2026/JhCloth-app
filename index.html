<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JhCloth TikTok Pro</title>

<style>
body{
  margin:0;
  background:black;
  font-family:Arial;
  color:white;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  text-align:center;
  padding:10px;
  z-index:10;
  background:rgba(0,0,0,0.6);
}

/* FEED */
.feed{
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

/* POST FULL SCREEN */
.post{
  height:100vh;
  scroll-snap-align:start;
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* MEDIA */
.post img,
.post video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* INFO */
.info{
  position:absolute;
  bottom:80px;
  left:15px;
  z-index:5;
}

.info h2{
  margin:0;
}

.info p{
  color:#ccc;
}

/* BUTTONS */
.actions{
  position:absolute;
  right:15px;
  bottom:120px;
  display:flex;
  flex-direction:column;
  gap:10px;
  z-index:5;
}

button{
  background:rgba(0,0,0,0.5);
  border:1px solid #444;
  color:white;
  padding:8px 10px;
  border-radius:50px;
  cursor:pointer;
}

button:hover{
  background:#222;
}
</style>
</head>

<body>

<header>
<h2>JHCLOTH</h2>
</header>

<div class="feed" id="feed"></div>

<script>

// =====================
// CONTENIDO
// =====================
const posts = [
  {
    type:"video",
    url:"https://www.w3schools.com/html/mov_bbb.mp4",
    title:"JhCloth Style",
    text:"Disciplina y presencia"
  },
  {
    type:"image",
    url:"https://source.unsplash.com/600x900/?fashion",
    title:"Moda urbana",
    text:"Elegancia sin precio"
  },
  {
    type:"video",
    url:"https://www.w3schools.com/html/movie.mp4",
    title:"Nueva colección",
    text:"Estilo único JhCloth"
  }
];

const feed = document.getElementById("feed");

// =====================
// CREAR POSTS
// =====================
posts.forEach((p, i) => {

  const div = document.createElement("div");
  div.className = "post";

  let media = "";

  if(p.type === "video"){
    media = `<video muted loop playsinline>
               <source src="${p.url}">
             </video>`;
  } else {
    media = `<img src="${p.url}">`;
  }

  div.innerHTML = `
    ${media}

    <div class="info">
      <h2>${p.title}</h2>
      <p>${p.text}</p>
    </div>

    <div class="actions">
      <button onclick="like(this)">❤️</button>
      <button>📤</button>
    </div>
  `;

  feed.appendChild(div);
});

// =====================
// AUTOPLAY TIPO TIKTOK
// =====================
const videos = document.querySelectorAll("video");

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.play();
    } else {
      entry.target.pause();
    }
  });
}, { threshold: 0.8 });

videos.forEach(v => observer.observe(v));

// =====================
// LIKE SIMPLE
// =====================
function like(btn){
  btn.innerText = "❤️";
  btn.style.transform = "scale(1.2)";
  setTimeout(()=>btn.style.transform="scale(1)",200);
}

</script>

</body>
</html>
