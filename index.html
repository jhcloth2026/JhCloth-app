
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>JhCloth | Instagram Style</title>

<style>
body{
font-family: Arial;
margin:0;
background:#0d0d0d;
color:white;
padding-bottom:80px;
}

/* HEADER */
h2{
text-align:center;
color:#00e5ff;
margin-top:20px;
}

.subtitle{
text-align:center;
font-size:14px;
opacity:0.7;
margin-bottom:10px;
}

/* LOGIN */
#login{
text-align:center;
padding:20px;
}

/* INPUTS */
input{
width:90%;
padding:10px;
margin:5px;
border:none;
border-radius:8px;
}

/* POST */
.post{
background:#1a1a1a;
margin:15px auto;
width:95%;
max-width:600px;
padding:15px;
border-radius:15px;
}

/* MEDIA */
.post img,
.post video,
.post iframe{
width:100%;
border-radius:10px;
margin-top:10px;
}

/* NAV */
.navbar{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
justify-content:space-around;
background:#000;
padding:10px;
}

.navbar button{
background:none;
color:white;
font-size:22px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>JhCloth</h2>
<div class="subtitle">Elegancia • Disciplina • Presencia</div>

<input id="email" placeholder="Email"><br>
<input id="password" placeholder="Password"><br>

<button onclick="register()">Registrar</button>
<button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<h2>JhCloth</h2>
<div class="subtitle">Elegancia • Disciplina • Presencia</div>

<h3>Crear post</h3>

<input id="postText" placeholder="Texto..."><br>
<input id="postImage" placeholder="Imagen URL"><br>
<input id="postVideo" placeholder="Video o YouTube URL"><br>

<button onclick="createPost()">Publicar ➕</button>

<h4>Posts: <span id="totalPosts">0</span></h4>

<div id="feed"></div>

<button onclick="logout()">Salir</button>

</div>

<!-- NAV -->
<div class="navbar">
<button onclick="location.reload()">🏠</button>
<button onclick="alert('Buscar')">🔎</button>
<button onclick="createPost()">➕</button>
<button>❤️</button>
<button>👤</button>
</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
apiKey: "TU_API_KEY",
authDomain: "TU_PROJECT.firebaseapp.com",
projectId: "TU_PROJECT",
storageBucket: "TU_PROJECT.appspot.com",
messagingSenderId: "XXXX",
appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const feed = document.getElementById("feed");

/* AUTH */
window.register = () => {
createUserWithEmailAndPassword(auth, email.value, password.value)
.then(()=>alert("Usuario creado"))
.catch(e=>alert(e.message));
};

window.login = () => {
signInWithEmailAndPassword(auth, email.value, password.value)
.then(()=>alert("Bienvenido"))
.catch(e=>alert(e.message));
};

window.logout = () => signOut(auth);

/* CREATE POST */
window.createPost = async () => {
if(!postText.value.trim()) return;

await addDoc(collection(db,"posts"),{
texto: postText.value,
mediaImage: postImage.value.trim(),
mediaVideo: postVideo.value.trim(),
fecha: Date.now(),
usuario: auth.currentUser?.email || "JhCloth",
likes:0,
likesList:[],
comentarios:[]
});

postText.value="";
postImage.value="";
postVideo.value="";
};

/* FEED */
const q = query(collection(db,"posts"),orderBy("fecha","desc"));

onSnapshot(q,(snapshot)=>{
feed.innerHTML="";
document.getElementById("totalPosts").innerText=snapshot.size;

snapshot.forEach(docSnap=>{
const p = docSnap.data();

let mediaHTML = "";

/* IMAGEN */
if(p.mediaImage){
mediaHTML += `<img src="${p.mediaImage}">`;
}

/* VIDEO / YOUTUBE */
if(p.mediaVideo){

if(p.mediaVideo.includes("youtube.com") || p.mediaVideo.includes("youtu.be")){

let id = "";

if(p.mediaVideo.includes("watch?v=")){
id = p.mediaVideo.split("watch?v=")[1].split("&")[0];
}else{
id = p.mediaVideo.split("youtu.be/")[1];
}

mediaHTML += `
<iframe width="100%" height="300"
src="https://www.youtube.com/embed/${id}"
allowfullscreen></iframe>`;
}
else{
mediaHTML += `<video src="${p.mediaVideo}" controls></video>`;
}
}

/* POST */
feed.innerHTML += `
<div class="post">
<b>${p.usuario}</b>
<p>${p.texto}</p>

${mediaHTML}
</div>
`;
});
});

/* SESSION */
onAuthStateChanged(auth,(user)=>{
document.getElementById("login").style.display=user?"none":"block";
document.getElementById("app").style.display=user?"block":"none";
});

</script>

</body>
</html>
