<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* CONFIG FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyBQtm1v6ftwVbdtr8me3bK-fNq2gOmGjvk",
  authDomain: "jhcloth-app.firebaseapp.com",
  projectId: "jhcloth-app",
  storageBucket: "jhcloth-app.firebasestorage.app",
  messagingSenderId: "683518974253",
  appId: "1:683518974253:web:c9f2e789d00f5a2e6f9ba4",
  measurementId: "G-G95JWS0LXR"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* REGISTRO */
window.register = () => {
  createUserWithEmailAndPassword(auth, email.value, password.value)
    .then(() => {
      alert("Usuario creado 🔥");
    })
    .catch(e => alert(e.message));
};

/* LOGIN (ARREGLADO) */
window.login = () => {
  signInWithEmailAndPassword(auth, email.value, password.value)
    .then(() => alert("Entraste correctamente 🔥"))
    .catch(e => alert(e.message));
};

/* LOGOUT */
window.logout = () => {
  signOut(auth);
};

/* CREAR POST */
window.createPost = async () => {
  const texto = postText.value;
  const imagen = postImage.value;

  if (!texto.trim()) {
    alert("Escribe algo primero");
    return;
  }

  try {
    await addDoc(collection(db, "posts"), {
      texto: texto,
      imagen: imagen,
      fecha: Date.now(),
      usuario: auth.currentUser ? auth.currentUser.email : "Anónimo",
      likes: 0
    });

    postText.value = "";
    postImage.value = "";

  } catch (e) {
    alert("Error al publicar: " + e.message);
  }
};

/* LIKE */
window.likePost = async (id, currentLikes) => {
  const postRef = doc(db, "posts", id);

  await updateDoc(postRef, {
    likes: currentLikes + 1
  });
};

/* FEED EN TIEMPO REAL */
const q = query(collection(db, "posts"), orderBy("fecha", "desc"));

onSnapshot(q, (snapshot) => {
  feed.innerHTML = "";

  snapshot.forEach(docSnap => {
    const p = docSnap.data();

    feed.innerHTML += `
      <div class="post">
        <h3>${p.usuario}</h3>
        <p>${p.texto}</p>

        ${p.imagen ? `<img src="${p.imagen}" style="width:100%;border-radius:10px;margin-top:10px;">` : ""}

        <button onclick="likePost('${docSnap.id}', ${p.likes || 0})">
          ❤️ Me gusta (${p.likes || 0})
        </button>
      </div>
    `;
  });
});

/* CONTROL DE SESIÓN (IMPORTANTE) */
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
  } else {
    document.getElementById("login").style.display = "block";
    document.getElementById("app").style.display = "none";
  }
});

</script>
