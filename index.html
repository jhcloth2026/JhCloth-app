<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>JhCloth ULTRA PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
  padding-bottom:80px;
}

header{
  text-align:center;
  padding:15px;
  color:#00e5ff;
  font-size:22px;
  font-weight:bold;
}

/* FEED */
#feed{
  max-width:600px;
  margin:auto;
}

/* POST STYLE IG */
.post{
  background:#111;
  margin:15px;
  padding:10px;
  border-radius:15px;
}

/* REELS STYLE */
.reel{
  background:black;
  margin:15px 0;
  height:80vh;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

.reel video{
  width:100%;
  max-height:70vh;
  border-radius:10px;
}

/* INPUTS */
input,button{
  width:90%;
  display:block;
  margin:5px auto;
  padding:10px;
  border-radius:8px;
  border:none;
}

button{
  background:#00e5ff;
  font-weight:bold;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#000;
  padding:10px;
  font-size:22px;
}
</style>
</head>

<body>

<header>JhCloth ULTRA PRO</header>

<!-- AUTH -->
<div id="auth">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="register()">Registrar</button>
  <button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<h3 style="text-align:center">Crear Post / Reel</h3>

<input id="text" placeholder="Texto">
<input id="img" placeholder="Imagen URL">
<input id="video" placeholder="Video URL (TikTok style)">
<button onclick="createPost()">Publicar</button>

<h3 style="text-align:center">Feed</h3>
<div id="feed"></div>

<button onclick="logout()">Salir</button>

</div>

<!-- NAV -->
<div class="nav">
<div>🏠</div>
<div>🔎</div>
<div>➕</div>
<div>❤️</div>
<div>👤</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
query,
orderBy,
doc,
updateDoc,
getDoc,
arrayUnion,
arrayRemove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
apiKey:"TU_API",
authDomain:"TU_DOMAIN",
projectId:"TU_ID",
storageBucket:"TU_BUCKET",
appId:"TU_APP"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const feed = document.getElementById("feed");

/* AUTH */
window.register = async ()=>{
await createUserWithEmailAndPassword(auth,email.value,password.value);
};

window.login = async ()=>{
await signInWithEmailAndPassword(auth,email.value,password.value);
};

window.logout = ()=>signOut(auth);

/* CREATE POST */
window.createPost = async ()=>{
if(!text.value.trim()) return;

await addDoc(collection(db,"posts"),{
text:text.value,
img:img.value || "",
video:video.value || "",
user:auth.currentUser.email,
time:Date.now(),
likes:[]
});

text.value="";
img.value="";
video.value="";
};

/* LIKE */
window.likePost = async (id)=>{
const ref = doc(db,"posts",id);
const snap = await getDoc(ref);
const data = snap.data();

const user = auth.currentUser.email;

if((data.likes||[]).includes(user)){
await updateDoc(ref,{likes:arrayRemove(user)});
}else{
await updateDoc(ref,{likes:arrayUnion(user)});
}
};

/* FEED (IG + REELS MIX) */
const q = query(collection(db,"posts"),orderBy("time","desc"));

onSnapshot(q,(snap)=>{

feed.innerHTML="";

snap.forEach(d=>{
const p=d.data();

let media="";

/* IMAGE */
if(p.img){
media+=`<img src="${p.img}" style="width:100%;border-radius:10px;margin-top:10px;">`;
}

/* VIDEO (REELS STYLE) */
if(p.video){
media+=`
<div class="reel">
<video src="${p.video}" controls autoplay></video>
</div>`;
}

feed.innerHTML+=`
<div class="post">

<b>@${p.user.split("@")[0]}</b>
<p>${p.text}</p>

${media}

<button onclick="likePost('${d.id}')">
❤️ ${(p.likes||[]).length}
</button>

</div>
`;
});
});

/* AUTH STATE */
onAuthStateChanged(auth,(user)=>{
document.getElementById("auth").style.display=user?"none":"block";
document.getElementById("app").style.display=user?"block":"none";
});

</script>

</body>
</html>
