<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>JhCloth | Moda & Disciplina</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#111;
  color:white;
  padding-bottom:70px;
}

/* HEADER STYLE */
h2, h3, h4{
  text-align:center;
  letter-spacing:2px;
}

/* LOGIN */
#login{
  text-align:center;
  padding:20px;
}

/* INPUTS */
input{
  width:90%;
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

/* POST */
.post{
  background:#1a1a1a;
  margin:10px;
  padding:10px;
  border-radius:12px;
  box-shadow:0 0 10px rgba(255,255,255,0.05);
}

.post b{
  color:#00e5ff;
}

/* MEDIA */
.post img,
.post video{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

/* BUTTONS */
button{
  padding:8px 12px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#00e5ff;
  color:black;
  font-weight:bold;
}

/* NAVBAR */
.navbar{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#000;
  padding:10px;
  border-top:1px solid #333;
}

.navbar button{
  background:none;
  color:white;
  font-size:22px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>JhCloth</h2>
  <p>Moda • Disciplina • Elegancia</p>

  <input id="email" placeholder="Email"><br>
  <input id="password" placeholder="Password"><br>

  <button onclick="register()">Registrar</button>
  <button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<h3>Crear post de moda</h3>
<p style="text-align:center;">Comparte estilo, disciplina y elegancia 🔥</p>

<input id="postText" placeholder="Escribe algo de moda..."><br>
<input id="postMedia" placeholder="Imagen o Video URL"><br>

<button onclick="createPost()">Publicar ➕</button>

<h4>Posts: <span id="totalPosts">0</span></h4>

<div id="feed"></div>

<button onclick="logout()">Salir</button>

</div>

<!-- NAV -->
<div class="navbar">
<button onclick="goHome()">🏠</button>
<button onclick="search()">🔎</button>
<button onclick="createPost()">➕</button>
<button onclick="alert('Likes')">❤️</button>
<button onclick="alert('Perfil')">👤</button>
</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
query,
orderBy,
doc,
updateDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
apiKey: "AIzaSyBQtm1v6ftwVbdtr8me3bK-fNq2gOmGjvk",
authDomain: "jhcloth-app.firebaseapp.com",
projectId: "jhcloth-app",
storageBucket: "jhcloth-app.firebasestorage.app",
messagingSenderId: "683518974253",
appId: "1:683518974253:web:c9f2e789d00f5a2e6f9ba4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const feed = document.getElementById("feed");

/* AUTH */
window.register = () => {
createUserWithEmailAndPassword(auth, email.value, password.value)
.then(()=>alert("Usuario creado 🔥"))
.catch(e=>alert(e.message));
};

window.login = () => {
signInWithEmailAndPassword(auth, email.value, password.value)
.then(()=>alert("Bienvenido a JhCloth 🔥"))
.catch(e=>alert(e.message));
};

window.logout = () => signOut(auth);

/* CREATE POST */
window.createPost = async () => {
if(!postText.value.trim()) return;

const user = auth.currentUser;

await addDoc(collection(db,"posts"),{
texto: postText.value,
media: postMedia.value,
fecha: Date.now(),
usuario: user?.email || "JhCloth",
likes:0,
likesList:[],
comentarios:[]
});

postText.value="";
postMedia.value="";
};

/* LIKE */
window.likePost = async (id) => {
const ref = doc(db,"posts",id);
const snap = await getDoc(ref);
const data = snap.data();

const user = auth.currentUser;
if(!user) return;

const email = user.email;
const list = data.likesList || [];

if(list.includes(email)){
await updateDoc(ref,{
likesList:list.filter(u=>u!==email),
likes:Math.max((data.likes||0)-1,0)
});
}else{
await updateDoc(ref,{
likesList:[...list,email],
likes:(data.likes||0)+1
});
}
};

/* COMMENT */
window.addComment = async (id) => {
const input = document.getElementById("c-"+id);
if(!input.value.trim()) return;

const ref = doc(db,"posts",id);
const snap = await getDoc(ref);
const data = snap.data();

const comments = data.comentarios || [];
comments.push(input.value);

await updateDoc(ref,{
comentarios:comments
});

input.value="";
};

/* FEED */
const q = query(collection(db,"posts"),orderBy("fecha","desc"));

onSnapshot(q,(snapshot)=>{
feed.innerHTML="";
document.getElementById("totalPosts").innerText=snapshot.size;

snapshot.forEach(docSnap=>{
const p = docSnap.data();

let mediaHTML = "";

if(p.media){
if(p.media.includes("mp4") || p.media.includes("video")){
mediaHTML = `<video src="${p.media}" controls></video>`;
}else{
mediaHTML = `<img src="${p.media}">`;
}
}

feed.innerHTML += `
<div class="post">

<b>@${p.usuario}</b>
<p>${p.texto}</p>

${mediaHTML}

<button onclick="likePost('${docSnap.id}')">
❤️ ${p.likes || 0}
</button>

<br>

<input id="c-${docSnap.id}" placeholder="Comentario">
<button onclick="addComment('${docSnap.id}')">Comentar</button>

${(p.comentarios||[]).map(c=>`<p>💬 ${c}</p>`).join("")}

</div>
`;
});
});

/* SESSION */
onAuthStateChanged(auth,(user)=>{
document.getElementById("login").style.display=user?"none":"block";
document.getElementById("app").style.display=user?"block":"none";
});

/* NAV */
window.goHome=()=>location.reload();
window.search=()=>alert("Buscar moda 🔎");

</script>

</body>
</html>
