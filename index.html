<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>JhCloth Social PRO FIX</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
}

header{
  text-align:center;
  padding:15px;
  color:#00e5ff;
  font-weight:bold;
}

#auth, #app{
  padding:10px;
}

input, button{
  width:95%;
  margin:5px auto;
  padding:10px;
  border-radius:8px;
  border:none;
  display:block;
}

button{
  background:#00e5ff;
  font-weight:bold;
  cursor:pointer;
}

#feed{
  margin-top:10px;
}

.post{
  background:#111;
  padding:10px;
  margin:10px 0;
  border-radius:12px;
}

.error{
  color:red;
  font-size:13px;
  text-align:center;
}
</style>
</head>

<body>

<header>JhCloth Social PRO</header>

<div id="auth">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="register()">Registrar</button>
  <button onclick="login()">Entrar</button>

  <p id="error" class="error"></p>
</div>

<div id="app" style="display:none">
  <h3>Crear Post</h3>
  <input id="text" placeholder="Texto">
  <input id="img" placeholder="Imagen URL">
  <button onclick="createPost()">Publicar</button>

  <div id="feed"></div>

  <button onclick="logout()">Salir</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 FIREBASE CONFIG (CAMBIA ESTO) */
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_AUTH_DOMAIN",
  projectId: "TU_PROJECT_ID",
  storageBucket: "TU_BUCKET",
  messagingSenderId: "TU_ID",
  appId: "TU_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const feed = document.getElementById("feed");
const errorBox = document.getElementById("error");

/* ERROR HANDLER */
function showError(msg){
  errorBox.textContent = msg;
  setTimeout(()=> errorBox.textContent="", 4000);
}

/* LOGIN */
window.login = async () => {
  try{
    const email = emailInput().value;
    const pass = passInput().value;

    await signInWithEmailAndPassword(auth,email,pass);
  }catch(e){
    showError(e.message);
  }
};

/* REGISTER */
window.register = async () => {
  try{
    const email = emailInput().value;
    const pass = passInput().value;

    await createUserWithEmailAndPassword(auth,email,pass);
  }catch(e){
    showError(e.message);
  }
};

window.logout = () => signOut(auth);

/* CREATE POST */
window.createPost = async () => {
  const text = document.getElementById("text").value;
  const img = document.getElementById("img").value;

  if(!auth.currentUser) return showError("Inicia sesión primero");

  await addDoc(collection(db,"posts"),{
    text,
    img,
    user: auth.currentUser.email,
    time: Date.now()
  });

  document.getElementById("text").value="";
  document.getElementById("img").value="";
};

/* FEED */
const q = query(collection(db,"posts"),orderBy("time","desc"));

onSnapshot(q,(snap)=>{
  feed.innerHTML="";

  snap.forEach(d=>{
    const p = d.data();

    feed.innerHTML += `
      <div class="post">
        <b>@${p.user.split("@")[0]}</b>
        <p>${p.text}</p>
        ${p.img ? `<img src="${p.img}" width="100%">` : ""}
      </div>
    `;
  });
});

/* AUTH STATE */
onAuthStateChanged(auth,(user)=>{
  document.getElementById("auth").style.display = user ? "none":"block";
  document.getElementById("app").style.display = user ? "block":"none";
});

/* helpers */
function emailInput(){ return document.getElementById("email"); }
function passInput(){ return document.getElementById("password"); }

</script>

</body>
</html>
