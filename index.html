<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>JhCloth ULTRA PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
}

/* HEADER */
header{
  text-align:center;
  padding:15px;
  color:#00e5ff;
}

#feed{
  height:100vh;
  overflow-y:auto;
  scroll-snap-type:y mandatory;
}

/* POST */
.post{
  background:#111;
  margin:10px;
  padding:10px;
  border-radius:15px;
  scroll-snap-align:start;
}

/* MEDIA */
.post img,
.post video{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

/* INPUTS */
input,button{
  width:90%;
  display:block;
  margin:5px auto;
  padding:10px;
  border-radius:8px;
  border:none;
}

button{
  background:#00e5ff;
  font-weight:bold;
}

/* LIKE */
.like-btn{
  background:#222;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:10px;
  margin-top:10px;
  transition:0.2s;
  cursor:pointer;
}

.like-btn.active{
  background:red;
  transform:scale(1.2);
}

/* PROFILE */
.profile{
  font-size:12px;
  opacity:0.7;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#000;
  padding:10px;
  font-size:22px;
}
</style>
</head>

<body>

<header>
  <h2>JhCloth</h2>
  <small>ELEGANCIA • DISCIPLINA • PRESENCIA</small>
</header>

<!-- AUTH -->
<div id="auth">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="register()">Registrar</button>
  <button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<h3 style="text-align:center">Crear Post</h3>

<input id="text" placeholder="Texto">
<input id="img" placeholder="Imagen URL">
<input id="video" placeholder="Video URL">
<button onclick="createPost()">Publicar</button>

<h3 style="text-align:center">Feed</h3>
<div id="feed"></div>

<button onclick="logout()">Salir</button>

</div>

<!-- NAV -->
<div class="nav">
<div>🏠</div>
<div>🔎</div>
<div>➕</div>
<div>❤️</div>
<div>👤</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
query,
orderBy,
doc,
updateDoc,
getDoc,
arrayUnion,
arrayRemove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyBQtm1v6ftwVbdtr8me3bK-fNq2gOmGjvk",
  authDomain: "jhcloth-app.firebaseapp.com",
  projectId: "jhcloth-app",
  storageBucket: "jhcloth-app.firebasestorage.app",
  messagingSenderId: "683518974253",
  appId: "1:683518974253:web:c9f2e789d00f5a2e6f9ba4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const feed = document.getElementById("feed");

/* AUTH */
window.register = async ()=>{
  await createUserWithEmailAndPassword(auth,email.value,password.value);
};

window.login = async ()=>{
  await signInWithEmailAndPassword(auth,email.value,password.value);
};

window.logout = ()=>signOut(auth);

/* CREATE POST (CORREGIDO) */
window.createPost = async ()=>{

  if(!text.value.trim()) return;

  await addDoc(collection(db,"posts"),{
    text:text.value,
    img:img.value || "",
    video:video.value || "",
    user:auth.currentUser.email,
    username:auth.currentUser.email.split("@")[0],
    time:Date.now(),
    likes:[],
    comments:[]
  });

  text.value="";
  img.value="";
  video.value="";
};

/* LIKE (ANIMADO) */
window.likePost = async (id)=>{

  const ref = doc(db,"posts",id);
  const snap = await getDoc(ref);
  const data = snap.data();

  const user = auth.currentUser.email;

  if((data.likes || []).includes(user)){
    await updateDoc(ref,{
      likes: arrayRemove(user)
    });
  }else{
    await updateDoc(ref,{
      likes: arrayUnion(user)
    });
  }
};

/* COMMENT */
window.addComment = async (id)=>{

  const input = document.getElementById("c-"+id);
  if(!input.value.trim()) return;

  const ref = doc(db,"posts",id);
  const snap = await getDoc(ref);
  const data = snap.data();

  const comments = data.comments || [];
  comments.push(input.value);

  await updateDoc(ref,{
    comments: comments
  });

  input.value="";
};

/* FEED */
const q = query(collection(db,"posts"),orderBy("time","desc"));

onSnapshot(q,(snap)=>{

  feed.innerHTML="";

  snap.forEach(d=>{
    const p=d.data();
    const user = p.user.split("@")[0];

    let media="";

    if(p.img) media += `<img src="${p.img}">`;
    if(p.video) media += `<video src="${p.video}" controls></video>`;

    feed.innerHTML += `
      <div class="post">

        <div class="profile">@${user}</div>
        <p>${p.text}</p>

        ${media}

        <button class="like-btn" onclick="likePost('${d.id}')">
          ❤️ ${(p.likes||[]).length}
        </button>

        <input id="c-${d.id}" placeholder="Comentario">
        <button onclick="addComment('${d.id}')">Comentar</button>

        ${(p.comments||[]).map(c=>`<p>💬 ${c}</p>`).join("")}

      </div>
    `;
  });

});

/* AUTH STATE */
onAuthStateChanged(auth,(user)=>{
  document.getElementById("auth").style.display = user ? "none" : "block";
  document.getElementById("app").style.display = user ? "block" : "none";
});

</script>

</body>
</html>
